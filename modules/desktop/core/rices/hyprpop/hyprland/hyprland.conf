monitor=eDP-1,1920x1080@60,auto,1
monitor=,1920x1080@60,auto,1,mirror,eDP-1

exec-once = waybar

# Fixes seatd error
# TODO: what error?
env = LIBSEAT_BACKEND,logind

input {
    kb_layout = us,ru
    kb_options = grp:alt_shift_toggle

    touchpad {
    	disable_while_typing = false
        natural_scroll = yes
    }

    sensitivity = 0
}

general {
    gaps_in = 5
    gaps_out = 10
    border_size = 2

    layout = dwindle
}

decoration {
    rounding = 0

    blur {
        enabled = true
        new_optimizations = true
        ignore_opacity = true
    }
}

animations {
    enabled = true

    bezier = b1, 0.05, 0.85, 0.03, 0.97
    bezier = b2, 0.07, 0.88, 0.04, 0.99
    bezier = b3, 1, 1, 1, 1
    bezier = b4, 0.05, 0.80, 0.10, 0.97
    bezier = b5, 0.05, 0.82, 0, 1
    bezier = b6, 0.20, 0, 0.82, 0.10
    bezier = b7, 0, 0.48, 0.38, 1

    animation = border, 1, 1.6, b3
    animation = borderangle, 1, 82, b3, loop
    animation = windowsIn, 1, 3.2, b2, slide
    animation = windowsOut, 1, 2.8, b7
    animation = windowsMove, 1, 3.0, b1, slide
    animation = fade, 1, 1.8, b4
    animation = layersIn, 1, 1.8, b5, slide
    animation = layersOut, 1, 1.5, b6
    animation = fadeLayersIn, 1, 1.6, b5
    animation = fadeLayersOut, 1, 1.8, b6
    animation = workspaces, 1, 4.0, b5, slide
}

dwindle {
    preserve_split = yes
}

misc {
    disable_hyprland_logo = true
    disable_autoreload = true

    enable_swallow = true
    swallow_regex=^(foot)$
}

ecosystem {
    no_update_news = false
}

$mainMod = SUPER

bind = $mainMod SHIFT,      RETURN,   exec, foot
bind = $mainMod SHIFT,      F,        exec, firefox
bind = $mainMod SHIFT,      R,        exec, reaper
bind = $mainMod SHIFT,      E,        exec, foot nvim # E stands for editor
bind = $mainMod SHIFT,      T,        exec, Telegram
bind = $mainMod SHIFT CTRL, R,        exec, renoise
bind = $mainMod,            Tab,      exec, pkill -SIGUSR1 waybar

bind = $mainMod, L, exec, lock

bind = $mainMod SHIFT, C, killactive,
bind = $mainMod SHIFT, Q, exit,
bind = $mainMod, V, togglefloating,
bind = $mainMod, C, centerwindow,
bind = $mainMod, J, togglesplit, # dwindle

# Move focus with mainMod + arrow keys
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Move window with mainMod + SHIFT + arrow keys
bind = $mainMod SHIFT, left, movewindow, l
bind = $mainMod SHIFT, right, movewindow, r
bind = $mainMod SHIFT, up, movewindow, u
bind = $mainMod SHIFT, down, movewindow, d

# Switch workspaces with mainMod + [0-5]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5

# Move active window to a workspace with mainMod + SHIFT + [0-5]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Toggle swallowing
bind = $mainMod, S, toggleswallow

bind = , F11, fullscreen

# Screenshots
bind = ,      Print, exec, screenshot-select
bind = SHIFT, Print, exec, screenshot-full

# Media keys
bind = , XF86AudioRaiseVolume, exec, amixer -q sset Master 1%+
bind = , XF86AudioLowerVolume, exec, amixer -q sset Master 1%-
bind = , XF86AudioMute, exec, amixer -q sset Master toggle

# Disable animations for wallpaper window
layerrule = match:namespace wallpaper, no_anim on

# Blur waybar background
# layerrule = match:namespace waybar, blur on

# Style popups
windowrule = match:tag popup, center on, stay_focused on, dim_around on, no_anim on

# Fix some dragging issues with XWayland
windowrule = no_focus on, match:class ^$, match:title ^$, match:xwayland 1, match:float 1, match:fullscreen 0, match:pin 0

# XWayland gtk file picker fix
windowrule = decorate off, match:class ^Xdg-desktop-portal-gtk$, match:xwayland 1

# Fix firefox file download dialog
windowrule = float on, match:class ^firefox$, match:title ^Opening
